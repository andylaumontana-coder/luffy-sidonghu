<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>我的会话 · Luffy 人生私董会</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--amber:#EF9F27;--text:#2c2c2a;--muted:#73726c;--border:rgba(0,0,0,0.08);--bg:#f5f4f0;--card:#fff}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:#1a1916;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-size:18px;font-weight:600}.logo span{color:var(--amber)}
.logo a{color:inherit;text-decoration:none}
.nav a{color:rgba(255,255,255,.7);font-size:13px;text-decoration:none;margin-left:16px}
.nav a:hover{color:#fff}

main{max-width:760px;margin:0 auto;padding:32px 24px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{color:var(--muted);font-size:14px;margin-bottom:24px}

.list{display:flex;flex-direction:column;gap:10px}
.row{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:16px 18px;cursor:pointer;transition:border-color .15s}
.row:hover{border-color:var(--amber)}
.row a{color:inherit;text-decoration:none;display:block}
.q{font-size:15px;font-weight:500;line-height:1.5;margin-bottom:6px}
.meta{font-size:12px;color:var(--muted);display:flex;gap:12px;align-items:center}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg);color:var(--muted)}
.badge.done{background:#FAEEDA;color:#633806}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.empty a{color:var(--amber);text-decoration:none}
.err{color:#A32D2D;font-size:13px;padding:20px 0}

@media(max-width:560px){
  header{padding:12px 14px}
  main{padding:20px 14px}
}
</style>
</head>
<body>
<header>
  <div class="logo"><a href="/">Luffy <span>人生私董会</span></a></div>
  <nav class="nav"><a href="/">新建会话</a></nav>
</header>

<main>
  <h1>我的会话</h1>
  <p class="sub">通过浏览器 cookie 识别。换设备或清除 cookie 后看不到。</p>
  <div id="list" class="list"></div>
</main>

<script>
const STATUS_LABEL = { clarifying: '澄清中', speaking: '幕僚发言中', completed: '已完成' };

function fmtDate(ms) {
  const d = new Date(ms);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if (sameDay) return d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'}) + ' ' +
         d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}

(async () => {
  const list = document.getElementById('list');
  try {
    const data = await fetch('/api/sessions').then(r => r.json());
    if (!data.sessions || data.sessions.length === 0) {
      list.outerHTML = '<div class="empty">还没有会话。<a href="/">开始第一次召集 →</a></div>';
      return;
    }
    list.innerHTML = data.sessions.map(s => `
      <a class="row" href="/session.html?id=${s.id}">
        <div class="q">${escapeHtml(s.question)}</div>
        <div class="meta">
          <span>${fmtDate(s.createdAt)}</span>
          <span class="badge ${s.hasSummary ? 'done' : ''}">${STATUS_LABEL[s.status] || ''}</span>
        </div>
      </a>
    `).join('');
  } catch (e) {
    list.outerHTML = `<div class="err">加载失败：${e.message}</div>`;
  }
})();

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
</script>
</body>
</html>
